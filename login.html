<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var saved = localStorage.getItem('mq-theme') || 'system';
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = saved === 'dark' || (saved === 'system' && prefersDark);
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Campus Marketplace</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="login-page">

    <!-- Left panel -->
    <div class="login-left">
      <div class="login-left-content">
        <div>
          <h1 class="login-headline">Campus Marketplace</h1>
          <p class="login-subtext">Buy, sell, and trade with Macquarie University students.</p>
        </div>
        <span class="login-badge">MQ Students Only</span>
      </div>
      <span class="login-footer-text">© 2026 Macquarie University</span>
    </div>

    <!-- Right panel -->
    <div class="login-right">
      <div class="login-right-inner">
        <h2 class="login-title">Sign in</h2>
        <p class="login-hint">Use your student email and password to continue.</p>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email-input">Student Email</label>
            <input class="form-input" type="email" id="email-input" name="email"
                   placeholder="name@students.mq.edu.au"
                   autocomplete="email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="password-input">Password</label>
            <input class="form-input" type="password" id="password-input" name="password"
                   placeholder="Enter your password"
                   autocomplete="current-password" required>
          </div>
          <button class="btn-login" type="submit" id="login-btn">Sign in →</button>
          <p id="error-msg" style="display:none; color: var(--color-accent); font-size: 12px; margin-top: 8px;"></p>
        </form>
      </div>
    </div>

  </div>

  <script type="module" src="js/theme.js"></script>
  <script type="module">
    // ── Firebase Auth — sign in ──────────────────────────────────────────
    import { auth } from "./js/firebase-config.js";
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // If user is already signed in, redirect to home page immediately
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "index.html";
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email    = document.getElementById("email-input").value.trim();
      const password = document.getElementById("password-input").value;
      const errorEl  = document.getElementById("error-msg");
      errorEl.style.display = "none";

      try {
        // Sign in the user with Firebase email/password authentication
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "index.html";
      } catch (err) {
        // Map Firebase error codes to human-readable messages
        const messages = {
          "auth/invalid-credential": "Incorrect email or password.",
          "auth/user-not-found":     "No account found with that email.",
          "auth/wrong-password":     "Incorrect password.",
          "auth/too-many-requests":  "Too many attempts. Please try again later."
        };
        errorEl.textContent = messages[err.code] || "Sign in failed. Please try again.";
        errorEl.style.display = "block";
      }
    });
  </script>

</body>
</html>
