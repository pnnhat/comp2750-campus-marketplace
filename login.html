<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var saved = localStorage.getItem('mq-theme') || 'system';
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = saved === 'dark' || (saved === 'system' && prefersDark);
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Campus Marketplace</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="login-page">

    <!-- Left panel -->
    <div class="login-left">
      <div class="login-left-content">
        <img src="assets/mq-logo-white.svg" alt="Macquarie University" height="32">
        <div>
          <h1 class="login-headline">Campus Marketplace</h1>
          <p class="login-subtext">Buy, sell, and trade with Macquarie University students.</p>
        </div>
        <span class="login-badge">MQ Students Only</span>
      </div>
      <span class="login-footer-text">© 2026 Campus Marketplace</span>
    </div>

    <!-- Right panel -->
    <div class="login-right">
      <button class="theme-toggle-btn login-theme-toggle" id="theme-toggle"
              title="Toggle theme" aria-label="Toggle theme"></button>

      <div class="login-right-inner">
        <h2 class="login-title">Sign in</h2>
        <p class="login-hint">Use your student email and password to continue.</p>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Student Email</label>
            <input class="form-input" type="email" id="email" name="email"
                   placeholder="name@students.mq.edu.au"
                   autocomplete="email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="Enter your password"
                   autocomplete="current-password" required>
          </div>
          <button class="btn-login" type="submit">Sign in →</button>
          <div class="form-error" id="login-error"></div>
        </form>
      </div>
    </div>

  </div>

  <script type="module" src="js/theme.js"></script>
  <script type="module">
    // ── Firebase Auth — sign in ──────────────────────────────────────────
    // TODO Phase 2: import { auth } from "./js/firebase-config.js";
    // TODO Phase 2: import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('login-error');
      errorDiv.classList.remove('visible');

      if (!email || !password) {
        errorDiv.textContent = 'Please enter your email and password.';
        errorDiv.classList.add('visible');
        return;
      }

      try {
        // TODO Phase 2: await signInWithEmailAndPassword(auth, email, password);
        sessionStorage.setItem('mq-user-email', email);
        window.location.href = 'index.html';
      } catch (err) {
        errorDiv.textContent = 'Invalid email or password. Please try again.';
        errorDiv.classList.add('visible');
      }
    });
  </script>

</body>
</html>
