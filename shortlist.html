<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var saved = localStorage.getItem('mq-theme') || 'system';
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = saved === 'dark' || (saved === 'system' && prefersDark);
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Shortlist — Campus Marketplace</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <img src="assets/Macquarie_University.png" alt="Macquarie University" class="nav-mq-img">
      <div class="nav-brand-divider"></div>
      <span class="nav-brand-name">Campus Marketplace</span>
    </a>
    <div class="nav-links">
      <a href="index.html"       class="nav-pill">Home</a>
      <a href="marketplace.html" class="nav-pill">Marketplace</a>
      <a href="mylistings.html"  class="nav-pill">My Listings</a>
      <a href="shortlist.html"   class="nav-pill active">Shortlist</a>
    </div>
    <div class="nav-right">
      <span class="nav-user-email" id="user-email"></span>
      <div class="theme-toggle-wrapper">
        <button class="theme-toggle-btn" id="theme-toggle"
                title="Toggle theme" aria-label="Toggle theme"></button>
      </div>
      <button class="nav-signout-btn" id="signout-btn">Sign out</button>
    </div>
  </nav>

  <!-- Page header -->
  <div class="page-header">
    <h1>My Shortlist</h1>
    <p>Items you have saved from the marketplace</p>
  </div>

  <!-- Items grid -->
  <div class="items-grid" id="shortlist-grid">

  </div>

  <!-- Empty state (hidden by default) -->
  <div class="empty-state shortlist-empty" id="empty-state" style="display:none;">
    <div class="empty-state-icon">♡</div>
    <div class="empty-state-title">Your shortlist is empty.</div>
    <div class="empty-state-sub">Browse the marketplace and shortlist items you are interested in.</div>
    <a href="marketplace.html" class="empty-state-btn">Browse Marketplace →</a>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <span>© 2026 Campus Marketplace</span>
    <span>Built for COMP2750 · Macquarie University</span>
  </footer>

  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/shortlist.js"></script>


</body>
</html>
