<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var saved = localStorage.getItem('mq-theme') || 'system';
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = saved === 'dark' || (saved === 'system' && prefersDark);
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Shortlist — Campus Marketplace</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <img src="assets/Macquarie_University.png" alt="Macquarie University" class="nav-mq-img">
      <div class="nav-brand-divider"></div>
      <span class="nav-brand-name">Campus Marketplace</span>
    </a>
    <div class="nav-links">
      <a href="index.html"       class="nav-pill">Home</a>
      <a href="marketplace.html" class="nav-pill">Marketplace</a>
      <a href="mylistings.html"  class="nav-pill">My Listings</a>
      <a href="shortlist.html"   class="nav-pill active">Shortlist</a>
    </div>
    <div class="nav-right">
      <span class="nav-user-email" id="user-email"></span>
      <div class="theme-toggle-wrapper">
        <button class="theme-toggle-btn" id="theme-toggle"
                title="Toggle theme" aria-label="Toggle theme"></button>
      </div>
      <button class="nav-signout-btn" id="signout-btn">Sign out</button>
    </div>
  </nav>

  <!-- Page header -->
  <div class="page-header">
    <h1>My Shortlist</h1>
    <p>Items you have saved from the marketplace</p>
  </div>

  <!-- Items grid -->
  <div class="items-grid" id="shortlist-grid">

  </div>

  <!-- Empty state (hidden by default) -->
  <div class="empty-state shortlist-empty" id="empty-state" style="display:none;">
    <div class="empty-state-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round"
           style="color: var(--color-text-muted);">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                 a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78
                 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </div>
    <div class="empty-state-title">Your shortlist is empty.</div>
    <div class="empty-state-sub">Browse the marketplace and shortlist items you are interested in.</div>
    <a href="marketplace.html" class="empty-state-btn">Browse Marketplace</a>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <span>Campus Marketplace</span>
    <span>© Macquarie University</span>
  </footer>

  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/shortlist.js"></script>

  <div class="modal-overlay" id="item-modal" style="display:none;">
    <div class="modal-fullscreen">
      <button class="modal-close-btn" id="modal-close">✕</button>
      <div class="modal-gallery">
        <div class="modal-gallery-main">
          <img class="modal-main-img" id="modal-main-img" src="" alt="">
          <div class="modal-img-placeholder" id="modal-img-placeholder"
               style="display:none;"></div>
          <button class="modal-arrow modal-arrow-left"
                  id="modal-prev" style="display:none;">&#8249;</button>
          <button class="modal-arrow modal-arrow-right"
                  id="modal-next" style="display:none;">&#8250;</button>
        </div>
        <div class="modal-thumbnails" id="modal-thumbnails"></div>
      </div>
      <div class="modal-details">
        <span class="badge modal-badge" id="modal-badge"></span>
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-price" id="modal-price"></div>
        <div class="modal-seller" id="modal-seller"></div>
        <div class="modal-divider"></div>
        <p class="modal-desc-label">Description</p>
        <p class="modal-desc" id="modal-desc"></p>
        <div class="modal-divider"></div>
        <button class="shortlist-btn shortlisted modal-shortlist-btn"
                id="modal-remove-btn" disabled>♥ Shortlisted</button>
      </div>
    </div>
  </div>

</body>
</html>
