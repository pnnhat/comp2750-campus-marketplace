<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var saved = localStorage.getItem('mq-theme') || 'system';
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = saved === 'dark' || (saved === 'system' && prefersDark);
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace — Campus Marketplace</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <img src="assets/Macquarie_University.png" alt="Macquarie University" class="nav-mq-img">
      <div class="nav-brand-divider"></div>
      <span class="nav-brand-name">Campus Marketplace</span>
    </a>
    <div class="nav-links">
      <a href="index.html"       class="nav-pill">Home</a>
      <a href="marketplace.html" class="nav-pill active">Marketplace</a>
      <a href="mylistings.html"  class="nav-pill">My Listings</a>
      <a href="shortlist.html"   class="nav-pill">Shortlist</a>
    </div>
    <div class="nav-right">
      <span class="nav-user-email" id="user-email"></span>
      <div class="theme-toggle-wrapper">
        <button class="theme-toggle-btn" id="theme-toggle"
                title="Toggle theme" aria-label="Toggle theme"></button>
      </div>
      <button class="nav-signout-btn" id="signout-btn">Sign out</button>
    </div>
  </nav>

  <!-- Page header -->
  <div class="page-header">
    <h1>Marketplace</h1>
    <p>Browse items listed by other students</p>
  </div>

  <!-- Filter chips -->
  <div class="filter-bar">
    <button class="filter-chip filter-btn active" data-category="all">All</button>
    <button class="filter-chip filter-btn" data-category="Textbooks">Textbooks</button>
    <button class="filter-chip filter-btn" data-category="Electronics">Electronics</button>
    <button class="filter-chip filter-btn" data-category="Furniture">Furniture</button>
    <button class="filter-chip filter-btn" data-category="Clothing">Clothing</button>
    <button class="filter-chip filter-btn" data-category="Accessories">Accessories</button>
    <button class="filter-chip filter-btn" data-category="Fitness">Fitness</button>
  </div>

  <!-- Items grid -->
  <div class="items-grid" id="listings-grid">
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <span>© 2026 Campus Marketplace</span>
    <span>Built for COMP2750 · Macquarie University</span>
  </footer>

  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/marketplace.js"></script>

  <!-- Item detail modal -->
  <div class="modal-overlay" id="item-modal" style="display:none;">
    <div class="modal-fullscreen">

      <!-- Close button top left -->
      <button class="modal-close-btn" id="modal-close">✕</button>

      <!-- Left: image gallery -->
      <div class="modal-gallery">
        <div class="modal-gallery-main">
          <img class="modal-main-img" id="modal-main-img" src="" alt="">
          <div class="modal-img-placeholder" id="modal-img-placeholder"
               style="display:none;"></div>
          <button class="modal-arrow modal-arrow-left"
                  id="modal-prev" style="display:none;">&#8249;</button>
          <button class="modal-arrow modal-arrow-right"
                  id="modal-next" style="display:none;">&#8250;</button>
        </div>
        <div class="modal-thumbnails" id="modal-thumbnails"></div>
      </div>

      <!-- Right: item details -->
      <div class="modal-details">
        <span class="badge modal-badge" id="modal-badge"></span>
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-price" id="modal-price"></div>
        <div class="modal-seller" id="modal-seller"></div>
        <div class="modal-divider"></div>
        <p class="modal-desc-label">Description</p>
        <p class="modal-desc" id="modal-desc"></p>
        <div class="modal-divider"></div>
        <button class="shortlist-btn modal-shortlist-btn"
                id="modal-shortlist-btn">&#9825; Shortlist</button>
      </div>

    </div>
  </div>

</body>
</html>
